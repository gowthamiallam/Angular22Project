<h1>DataBinding</h1>
<table>
    <tr>
        <td>
            <input type="text" [(ngModel)]="productName">
        </td>
        <td>
            <select [(ngModel)]="productName" (change)="onDropDownChange()">
                <option>Select</option>
                <option>Laptop</option>
                <option>Mobile</option>
                <option>HeadPhone</option>
                <option>Charger</option>
            </select>
        </td>
        <td>
            <input type="checkbox" [(ngModel)]="isProductActive">
        </td>
        <td>
            isisProductActive =>{{isProductActive}}
        </td>
    </tr>
</table>
<hr>
<table style="width:100%">
    <tr>
        <td>
            {{productName}}
        </td>
        <td>
            {{productPrice}}
        </td>
        <td>
            <input type="text" value="{{productName}}">
        </td>
        <td>
        <td>
            <input type="text" [value]="productName">
        </td>
        <td>
            <input type="text" [maxLength]="maxAllowedChar">
        </td>
        <td>
            <input type="{{myDynamicType}}">
        </td>
        <td>
            <input [type]="myDynamicType1">
        </td>
    </tr>
</table>

<hr>
<table>
    <tr>
        <td>
            <button (click)="showWelcomeText()">Show Welcome</button>
        </td>
        <td>
            <select name="" id="" (change)="onDropDownChange()"> //Event Data Binding
                <option value="">Select</option>
                <option value="">Laptop</option>
                <option value="">Mobile</option>
                <option value="">HeadPhone</option>
                <option value="">Charger</option>
            </select>
        </td>
    </tr>
</table>

<div (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeft()"
    style="background-color:red ;width :100px;height:100px;border-radius:50px;">

</div>
