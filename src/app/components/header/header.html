<header class="app-header">
      <!-- Left side: Application Branding -->
      <div class="logo">My Dashboard</div>
      
      <!-- Right side: User Profile Actions Wrapper -->
      <div class="user-actions">
        <span class="user-name">Welcome, {{userName}}</span>
        <button class="logout-btn" (click)="logout()">
          <!-- Optional: Logout Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="logout-icon"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
      </div>
    </header>
