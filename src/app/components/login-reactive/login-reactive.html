<!-- login.component.html -->
<div class="login-wrapper">
    <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please sign in to access your dashboard</p>

        <!-- Global Auth Error Alert Box -->
        <div *ngIf="errorMessage" class="auth-alert text-danger">
            {{ errorMessage }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <!-- Email Field -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" formControlName="email"
                    [ngClass]="{ 'is-invalid': isSubmitted && f['email'].errors }" placeholder="name@example.com" />

                <!-- Email Error Messages -->
                <div *ngIf="isSubmitted && f['email'].errors" class="error-message">
                    <small *ngIf="f['email'].errors['required']">Email is required.</small>
                    <small *ngIf="f['email'].errors['email']">Please enter a valid email address.</small>
                </div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" formControlName="password"
                    [ngClass]="{ 'is-invalid': isSubmitted && f['password'].errors }" placeholder="••••••••" />

                <!-- Password Error Messages -->
                <div *ngIf="isSubmitted && f['password'].errors" class="error-message">
                    <small *ngIf="f['password'].errors['required']">Password is required.</small>
                    <small *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters.</small>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="login-btn">Sign In</button>

        </form>
    </div>
</div>
